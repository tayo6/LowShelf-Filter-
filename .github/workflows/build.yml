name: Build VST3 (Windows)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        shell: cmd
        run: cmake --build build --config Release --target LowShelfFilter_VST3

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LowShelfFilter-VST3-Windows
          path: build/LowShelfFilter_artefacts/Release/VST3/
          if-no-files-found: error
